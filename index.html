<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docs - Challenge Robotik</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-blue: #0062ff;
            --primary-green: #10b981;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { background: rgba(30, 41, 59, 0.5); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); text-align: center; margin-bottom: 30px; }
        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .doc-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.3s; text-align: center; }
        .doc-card:hover { border-color: var(--primary-blue); transform: translateY(-5px); background: rgba(255,255,255,0.08); }
        .btn-open { margin-top: 15px; width: 100%; background: var(--primary-blue); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        
        /* Visionneuse Overlay */
        .viewer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .viewer-header { width: 95%; display: flex; justify-content: space-between; padding: 15px; }
        .viewer-container { width: 95%; height: 85%; background: white; border-radius: 10px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="https://i.ibb.co/XxJybFzH/Design-sans-titre.png" height="50">
        <h1>DOCUMENTS ROBOTIK</h1>
    </header>

    <div class="doc-grid" id="docGrid"></div>
</div>

<div class="viewer-overlay" id="viewer">
    <div class="viewer-header">
        <span id="viewer-title" style="font-weight:700">Aperçu</span>
        <button class="close-btn" onclick="closeViewer()">FERMER</button>
    </div>
    <div class="viewer-container">
        <iframe id="pdf-frame" src=""></iframe>
    </div>
</div>

<script>
    // BASE DE DONNÉES MISE À JOUR AVEC LE NOUVEAU NOM
    const DATABASE = [
        { 
            title: "Règlement 2025-2026", 
            file: "reglement 2025-2026 officiel.pdf (2)" 
        },
        { 
            title: "Projets & Membres", 
            file: "Projets.pdf" 
        }
    ];

    function render() {
        const grid = document.getElementById('docGrid');
        grid.innerHTML = DATABASE.map((doc, index) => `
            <div class="doc-card" onclick="openViewer(${index})">
                <i data-lucide="file-text" size="40" color="#0062ff"></i>
                <h3 style="margin:15px 0;">${doc.title}</h3>
                <button class="btn-open">Lire le PDF</button>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function openViewer(index) {
        const doc = DATABASE[index];
        document.getElementById('viewer-title').innerText = doc.title;
        document.getElementById('pdf-frame').src = doc.file;
        document.getElementById('viewer').style.display = 'flex';
    }

    function closeViewer() {
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('pdf-frame').src = "";
    }

    window.onload = render;
</script>
</body>
</html>
